name: CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  issues: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/pretzel-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/pretzel-frontend
  VITE_API_BASE_URL: http://localhost:3001

jobs:
  lint-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: |
         npm run lint --if-present || {
          echo "::error title=Backend lint failed::Run cd backend && npm run lint locally"
          exit 1
         }

      - name: Test
        id: test
        run: npm test --if-present

      - name: Write job summary
        if: always()
        run: |
          echo "## Backend lint & test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Outcome |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ${{ steps.lint.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | ${{ steps.test.outcome }} |" >> "$GITHUB_STEP_SUMMARY"  

  lint-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: |
         npm run lint --if-present || {
          echo "::error title=Frontend lint failed::Run cd frontend && npm run lint locally"
          exit 1
         } 
        
      - name: Test
        id: test
        run: npm test --if-present

      - name: Production build
        id: build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}

      - name: Write job summary
        if: always()
        run: |
          echo "## Frontend lint & test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Outcome |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ${{ steps.lint.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | ${{ steps.test.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ steps.build.outcome }} |" >> "$GITHUB_STEP_SUMMARY"

  build-scan-sign-backend:
    needs: [lint-test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign backend image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}@${DIGEST}"

  build-scan-sign-frontend:
    needs: [lint-test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign frontend image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}@${DIGEST}"


  pr-summary:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs:
      - lint-test-backend
      - lint-test-frontend
      - build-scan-sign-backend
      - build-scan-sign-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Comment PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = `### CI summary

            - Backend lint/test: ${{ needs.lint-test-backend.result }}
            - Frontend lint/test: ${{ needs.lint-test-frontend.result }}
            - Backend image build: ${{ needs.build-scan-sign-backend.result }}
            - Frontend image build: ${{ needs.build-scan-sign-frontend.result }}

            [View workflow run](${runUrl})
            `;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
      
  deploy:
    name: Deploy to Production

    needs:
      - build-scan-sign-backend
      - build-scan-sign-frontend

    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d "$HOME/.ssh"

          printf '%s\n' "$SSH_PRIVATE_KEY" \
            > "$HOME/.ssh/pretzel_deploy_key"

          chmod 600 "$HOME/.ssh/pretzel_deploy_key"

          printf '%s\n' "$SSH_KNOWN_HOSTS" \
            > "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Test SSH connection
        shell: bash
        run: |
          ssh \
            -i "$HOME/.ssh/pretzel_deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'whoami && docker compose version'

      - name: Copy production Compose file
        shell: bash
        run: |
          scp \
            -i "$HOME/.ssh/pretzel_deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            deploy/docker-compose.prod.yml \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/pretzel-shop/docker-compose.prod.yml"

      - name: Authenticate EC2 to GHCR
        shell: bash
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          printf '%s' "$GHCR_PULL_TOKEN" |
            ssh \
              -i "$HOME/.ssh/pretzel_deploy_key" \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              'docker login ghcr.io --username njamutoh --password-stdin'

      - name: Pull and deploy application
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"

          echo "Deploying image tag: $IMAGE_TAG"

          ssh \
            -i "$HOME/.ssh/pretzel_deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "IMAGE_TAG='$IMAGE_TAG' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd /opt/pretzel-shop
          export IMAGE_TAG

          trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT

          echo "Pulling backend and frontend images..."

          docker compose \
            --env-file .env \
            -f docker-compose.prod.yml \
            -p pretzel_app \
            pull backend frontend

          echo "Recreating application containers..."

          docker compose \
            --env-file .env \
            -f docker-compose.prod.yml \
            -p pretzel_app \
            up -d --no-deps backend frontend

          echo "Container status:"

          docker compose \
            --env-file .env \
            -f docker-compose.prod.yml \
            -p pretzel_app \
            ps backend frontend

          echo "Waiting for backend health endpoint..."

          for attempt in 1 2 3 4 5 6; do
            if curl -fsS http://localhost:3001/health >/dev/null; then
              echo "Backend health check passed."
              break
            fi

            if [ "$attempt" -eq 6 ]; then
              echo "Backend health check failed."

              docker compose \
                --env-file .env \
                -f docker-compose.prod.yml \
                -p pretzel_app \
                logs --tail=100 backend

              exit 1
            fi

            sleep 5
          done

          curl -fsSI http://localhost >/dev/null

          echo "Frontend smoke test passed."
          echo "Deployment completed successfully."
          REMOTE_SCRIPT

      - name: Remove temporary SSH files
        if: always()
        shell: bash
        run: |
          rm -f "$HOME/.ssh/pretzel_deploy_key"
          rm -f "$HOME/.ssh/known_hosts"
